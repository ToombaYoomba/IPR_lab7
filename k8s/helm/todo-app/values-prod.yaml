namespace: lab6-prod

backend:
  replicas: 3
  resources:
    requests:
      memory: "256Mi"
      cpu: "200m"
    limits:
      memory: "512Mi"
      cpu: "500m"

frontend:
  replicas: 2

database:
  host: "postgres-0.postgres.lab6-dev.svc.cluster.local"
  password: "REPLACE_WITH_PROD_SECRET"

redis:
  host: "redis.lab6-dev.svc.cluster.local"

hpa:
  minReplicas: 3
  maxReplicas: 10
  cpuUtilization: 50
