apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: lab6-prod

bases:
  - ../../base

resources:
  - secret.yaml

patches:
  - path: patch-configmap.yaml
    target:
      kind: ConfigMap
      name: app-config
  - path: patch-replicas.yaml
    target:
      kind: Deployment
      name: backend
